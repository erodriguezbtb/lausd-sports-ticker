<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRoEVagIx-2UFRE2vpmQqMuegm29fuop_5p7yAQZ29RVn1Bi2kSTHNqtQ_-0gNvcbiB7clK1FZMzSzj/pub?output=csv";

fetch(sheetURL)
  .then(response => response.text())
  .then(data => {
    const rows = data.trim().split("\n").slice(1);
    const container = document.getElementById("ticker");

    let currentSport = "";

    rows.forEach(row => {
      // Split AND clean quotes
      const cols = row.split(",").map(c => c.replace(/"/g, "").trim());

      if (cols.length < 6) return;

      const sport = cols[0];
      const team1 = cols[1];
      const score1 = cols[2];
      const team2 = cols[3];
      const score2 = cols[4];
      const status = cols[5];

      if (sport !== currentSport) {
        currentSport = sport;
        container.innerHTML += `<div class="block">${sport}</div>`;
      }

      let team1Class = "";
      let team2Class = "";

      if (parseInt(score1) > parseInt(score2)) {
        team1Class = "winner";
      } else if (parseInt(score2) > parseInt(score1)) {
        team2Class = "winner";
      }

      container.innerHTML += `
        <div class="game">
          <div class="final">${status}</div>
          <div class="teams">
            <div class="${team1Class}">${team1} ${score1}</div>
            <div class="${team2Class}">${team2} ${score2}</div>
          </div>
        </div>
      `;
    });
  });
</script>
